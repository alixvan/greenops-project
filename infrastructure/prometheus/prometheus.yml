global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:3000

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-service:3001

  - job_name: metrics-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - metrics-service:3003

  - job_name: alert-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - alert-service:3004
