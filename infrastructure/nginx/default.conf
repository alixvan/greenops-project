upstream frontend_upstream {
    server frontend:80;
}

upstream api_gateway_upstream {
    server api-gateway:3000;
}

upstream auth_service_upstream {
    server auth-service:3001;
}

upstream metrics_service_upstream {
    server metrics-service:3003;
}

upstream alert_service_upstream {
    server alert-service:3004;
}

server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://api_gateway_upstream;
    }

    location /gateway-health {
        proxy_pass http://api_gateway_upstream/health;
    }

    location = /prometheus-targets/api-gateway/metrics {
        proxy_pass http://api_gateway_upstream/metrics;
    }

    location = /prometheus-targets/auth-service/metrics {
        proxy_pass http://auth_service_upstream/metrics;
    }

    location = /prometheus-targets/metrics-service/metrics {
        proxy_pass http://metrics_service_upstream/metrics;
    }

    location = /prometheus-targets/alert-service/metrics {
        proxy_pass http://alert_service_upstream/metrics;
    }

    location / {
        proxy_pass http://frontend_upstream;
    }
}
