services:
  frontend:
   build:
    context: ./frontend

   container_name: greenops-frontend

   networks:
     - backend-network

  postgres:
    image: postgres:17
    container_name: greenops-postgres

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
       - postgres_data:/var/lib/postgresql/data
       - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - backend-network

  redis:
    image: redis:8-alpine
    container_name: greenops-redis

    ports:
     - "6379:6379"

    networks:
     - backend-network
  nginx:
    image: nginx:alpine
    
    container_name: greenops-nginx
    
    ports:
    - "80:80"
    
    volumes:
    - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    
    depends_on:
    - frontend
    - auth-service
    
    networks:
    - backend-network
  prometheus:
    image: prom/prometheus

    container_name: greenops-prometheus

    ports:
     - "9090:9090"

    volumes:
     - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    networks:
     - backend-network

  grafana:
    image: grafana/grafana
    
    container_name: greenops-grafana

    restart: always

    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

    ports:
      - "3002:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - backend-network

  auth-service:
    build:
      context: ./services/auth-service

    container_name: auth-service

    env_file:
      - .env

    ports:
      - "3001:3001"

    depends_on:
      - postgres
      - redis

    networks:
      - backend-network

volumes:
  postgres_data:
  grafana_data:

networks:
  backend-network:
    driver: bridge