name: greenops-platform

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      api-gateway:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    networks:
      - app
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
    env_file:
      - .env
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      METRICS_SERVICE_URL: http://metrics-service:3003
      ALERT_SERVICE_URL: http://alert-service:3004
    expose:
      - "3000"
    depends_on:
      auth-service:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
    env_file:
      - .env
    environment:
      AUTH_SERVICE_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
      - data
    restart: unless-stopped

  metrics-service:
    build:
      context: ./services/metrics-service
    env_file:
      - .env
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
    expose:
      - "3003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
      - data
    restart: unless-stopped

  alert-service:
    build:
      context: ./services/alert-service
    env_file:
      - .env
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      METRICS_SERVICE_URL: http://metrics-service:3003
    expose:
      - "3004"
    depends_on:
      postgres:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app
      - data
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - app
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true
  observability:
    driver: bridge
